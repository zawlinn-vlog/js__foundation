<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bankit APP | LOGOIN</title>

    <!-- FONT AWESOME -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"
      integrity="sha512-Tn2m0TIpgVyTzzvmxLNuqbSJH3JP8jm+Cy3hvHrW7ndTDcJ1w5mBiksqDBb8GpE2ksktFvDB/ykZ0mDpsZj20w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <!-- CUSTOM CSS -->
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <!--  -->
    <main class="wrapper">
      <!-- NAVIGATION SECTION -->
      <nav class="navbar">
        <h3 class="navbar__brand">Login to get started</h3>
        <img src="./assets/img/logo.png" alt="" class="navbar__logo" />
        <form action="" class="navbar__form">
          <div class="form__group">
            <input
              type="text"
              name=""
              id=""
              class="navbar__form-input"
              placeholder="username"
            />
            <label for="" class="navbar__form-label">Username</label>
          </div>
          <div class="form__group">
            <input
              type="password"
              name=""
              id=""
              class="navbar__form-input"
              placeholder="PIN"
            />
            <label for="" class="navbar__form-label">PIN</label>
          </div>
          <button type="submit" class="btn btn__submit">
            <i class="fas fa-arrow-right"></i>
          </button>
        </form>
      </nav>
    </main>
  </body>
</html>
